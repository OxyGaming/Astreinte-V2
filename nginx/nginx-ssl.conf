# ─────────────────────────────────────────────────────────────────────────────
# nginx-ssl.conf — Étape 2 : HTTPS + redirection HTTP → HTTPS
# Remplace nginx.conf une fois le certificat Let's Encrypt obtenu.
# Remplacer TON_DOMAINE.COM par votre domaine réel.
# ─────────────────────────────────────────────────────────────────────────────

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name TON_DOMAINE.COM www.TON_DOMAINE.COM;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name TON_DOMAINE.COM www.TON_DOMAINE.COM;

    # Certificats Let's Encrypt
    ssl_certificate     /etc/nginx/ssl/live/TON_DOMAINE.COM/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/TON_DOMAINE.COM/privkey.pem;

    # Paramètres SSL modernes
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # En-têtes sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Reverse proxy vers Next.js
    location / {
        proxy_pass         http://astreinte:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout    60s;
        proxy_connect_timeout 60s;
    }

    # Cache assets statiques
    location /_next/static/ {
        proxy_pass http://astreinte:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
