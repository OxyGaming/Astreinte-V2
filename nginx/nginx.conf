# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Étape 1 : HTTP uniquement (avant Let's Encrypt)
# Remplacer par nginx-ssl.conf une fois le certificat obtenu.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;          # accepte toute IP ou domaine

    # Challenge Let's Encrypt (ACME)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Reverse proxy vers Next.js
    location / {
        proxy_pass         http://astreinte:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout généreux pour les pages SSR
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Cache agressif pour les assets statiques Next.js
    location /_next/static/ {
        proxy_pass http://astreinte:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
