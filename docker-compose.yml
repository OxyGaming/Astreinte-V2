services:
  astreinte:
    build:
      context: .
      dockerfile: Dockerfile
    image: astreinte-app:latest
    container_name: astreinte-app
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: astreinte-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # certificats Let's Encrypt
      - certbot-www:/var/www/certbot:ro         # challenge ACME
    depends_on:
      - astreinte
    networks:
      - web

  certbot:
    image: certbot/certbot
    container_name: astreinte-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

networks:
  web:
    driver: bridge

volumes:
  certbot-www:
